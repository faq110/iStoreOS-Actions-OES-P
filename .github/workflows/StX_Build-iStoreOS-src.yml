name: 💿 StX_Build-iStoreOS-src
on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      openwrt_board:
        description: "1、请选择设备型号"
        required: true
        default: "s905d_s905x3_s912_s922x-ct2000"
        type: choice
        options:
          - s905l3a
          - a311d-oes_s922x-oes-plus_wxy-oect
          - nsy-g16-plus_nsy-g68-plus_bdy-g18-pro
          - s905d_s905x3_s912_s922x-ct2000
          # ... 其他选项保持不变 ...（为了简洁，省略了中间部分）
          - zysj
      openwrt_kernel:
        description: "2、请选择内核版本"
        required: true
        default: "6.6.y"
        type: choice
        options:
          - 6.6.y
          - 6.12.y
          - 6.18.y
      auto_kernel:
        description: "自动使用最新内核-未匹配则自动"
        required: false
        default: true
        type: boolean

env:
  VERSION: 24.10.6

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:  # ⭐ 添加这个权限配置
      contents: write  # 允许创建 Release 和上传文件
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # ⭐ 升级到 v4（使用 Node.js 24）
        # 或者继续使用 v3 但会有警告
        # uses: actions/checkout@v3

      - name: ⏬ 下载 rootfs.tar.gz
        run: |
          echo "📦 正在下载预构建 rootfs"
          mkdir -p bin/targets/armsr/armv8
          curl -L -o bin/targets/armsr/armv8/openwrt-armvirt-64-default-rootfs.tar.gz \
            https://github.com/Kwonelee/Rootfs-Actions/releases/download/generic-rootfs/istoreos-armsr-armv8-generic-rootfs.tar.gz

      - name: 🔍 查找rootfs.tar.gz所在路径
        id: find_rootfs
        run: |
          ROOTFS_FILE=$(find bin/targets/armsr/armv8/ -type f -name "*rootfs.tar.gz" | head -n1)
          echo "✅ Found: $ROOTFS_FILE"
          if [ ! -f "$ROOTFS_FILE" ]; then
            echo "❌ 找不到 rootfs.tar.gz 文件"
            exit 1
          fi
          echo "file=$ROOTFS_FILE" >> $GITHUB_OUTPUT

      - name: 🧱 打包iStoreOS固件
        uses: Kwonelee/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: ${{ steps.find_rootfs.outputs.file }}
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ophub/kernel
          kernel_usage: stable
          builder_name: kwonelee

      - name: 📜 调整.img.gz 文件名
        id: rename
        run: |
          for FILE in ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz; do
            echo "Processing file: $FILE"
            FILENAME=$(basename "$FILE")
            NEW_FILENAME=$(echo "$FILENAME" | sed 's/openwrt/istoreos_${{ env.VERSION }}/g')
            if [ "$FILENAME" != "$NEW_FILENAME" ]; then
              mv "$FILE" "${{ env.PACKAGED_OUTPUTPATH }}/$NEW_FILENAME"
              echo "Renamed $FILENAME to $NEW_FILENAME"
            else
              echo "No need to rename $FILENAME"
            fi
          done

      - name: 🚀 上传到 Release
        uses: softprops/action-gh-release@v2.2.2  # ⭐ 升级到最新版本（修复 Node.js 问题）
        with:
          tag_name: iStoreOS-${{ env.VERSION }}-SNAPSHOT-dhcp
          body: |
            🔄 版本： iStoreOS-${{ env.VERSION }}-SNAPSHOT（源码编译后构建，插件集成适度精简）
            
            📂 来源： https://github.com/istoreos/istoreos
            
            🧠 内核： Please Login to iStoreOS → System → Amlogic Service → Replace the Kernel
            
            🧩 集成： 包含了基础系统组件、驱动、网络工具、容器支持、LuCI界面及插件等
            
            👤 用户名： root
            
            🔒 密码： 无
            
            🌐 IP： 单网口-动态获取（从上级路由找寻）；多网口-IP：192.168.100.1
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}  # ⭐ 改用 GITHUB_TOKEN 而不是 GH_TOKEN
